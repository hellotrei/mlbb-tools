name: Deploy Blue Green

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mlbb-tools

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/bluegreen/Dockerfile.api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.image_tag }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/bluegreen/Dockerfile.web
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.image_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/bluegreen/*,scripts/deploy-bluegreen.sh"
          target: "/opt/mlbb-tools"

      - name: Run blue-green deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/mlbb-tools
            chmod +x scripts/deploy-bluegreen.sh
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            export GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
            export GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
            ./scripts/deploy-bluegreen.sh
