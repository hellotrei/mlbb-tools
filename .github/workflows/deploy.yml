name: Deploy Blue Green

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "infra/bluegreen/**"
      - "scripts/deploy-bluegreen.sh"
      - "scripts/deploy-api-vps.sh"
      - "data/**"

concurrency:
  group: deploy-bluegreen-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mlbb-tools

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy_mode: ${{ steps.mode.outputs.deploy_mode }}
      build_api: ${{ steps.mode.outputs.build_api }}
      build_web: ${{ steps.mode.outputs.build_web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/shared/**'
              - 'infra/bluegreen/Dockerfile.api'
              - 'scripts/deploy-api-vps.sh'
              - 'data/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'infra/bluegreen/Dockerfile.web'
              - 'scripts/deploy-bluegreen.sh'
            infra:
              - 'infra/bluegreen/**'
              - 'scripts/deploy-bluegreen.sh'

      - name: Resolve deploy mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy_mode=full" >> "$GITHUB_OUTPUT"
            echo "build_api=true" >> "$GITHUB_OUTPUT"
            echo "build_web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ steps.filter.outputs.web }}" == "true" || "${{ steps.filter.outputs.infra }}" == "true" ]]; then
            echo "deploy_mode=full" >> "$GITHUB_OUTPUT"
            echo "build_api=true" >> "$GITHUB_OUTPUT"
            echo "build_web=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.filter.outputs.api }}" == "true" ]]; then
            echo "deploy_mode=api-only" >> "$GITHUB_OUTPUT"
            echo "build_api=true" >> "$GITHUB_OUTPUT"
            echo "build_web=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_mode=full" >> "$GITHUB_OUTPUT"
            echo "build_api=true" >> "$GITHUB_OUTPUT"
            echo "build_web=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      created_at: ${{ steps.meta.outputs.created_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        if: needs.changes.outputs.build_api == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/bluegreen/Dockerfile.api
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created_at }}

      - name: Build and push Web image
        if: needs.changes.outputs.build_web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/bluegreen/Dockerfile.web
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created_at }}

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable legacy VPS poller
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            systemctl disable --now mlbb-sync-main.timer || true

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/bluegreen/*,scripts/deploy-bluegreen.sh,scripts/deploy-api-vps.sh"
          target: "/opt/mlbb-tools"

      - name: Run deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/mlbb-tools
            chmod +x scripts/deploy-bluegreen.sh
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            export GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
            export GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
            if [[ "${{ needs.changes.outputs.deploy_mode }}" == "api-only" ]]; then
              chmod +x scripts/deploy-api-vps.sh
              ./scripts/deploy-api-vps.sh
            else
              chmod +x scripts/deploy-bluegreen.sh
              ./scripts/deploy-bluegreen.sh
            fi

      - name: Record release metadata
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/mlbb-tools/infra/bluegreen
            mkdir -p .deploy
            api_slot="$(cat .active-slot-api 2>/dev/null || true)"
            web_slot="$(cat .active-slot 2>/dev/null || true)"
            printf '{"deployed_at":"%s","sha":"%s","image_tag":"%s","mode":"%s","actor":"%s","api_slot":"%s","web_slot":"%s","workflow":"%s","run_id":"%s"}\n' \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              "${{ github.sha }}" \
              "${{ needs.build-and-push.outputs.image_tag }}" \
              "${{ needs.changes.outputs.deploy_mode }}" \
              "${{ github.actor }}" \
              "$api_slot" \
              "$web_slot" \
              "${{ github.workflow }}" \
              "${{ github.run_id }}" >> .deploy/releases.jsonl
