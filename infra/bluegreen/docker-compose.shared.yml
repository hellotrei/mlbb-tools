services:
  postgres:
    image: postgres:16-alpine
    container_name: mlbb-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mlbb_tools}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - effective_cache_size=512MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - random_page_cost=1.1
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mlbb_tools}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mlbb_postgres_data:/var/lib/postgresql/data
    networks:
      - mlbb_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mlbb-redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mlbb_redis_data:/data
    networks:
      - mlbb_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: mlbb-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./active-upstream.conf:/etc/nginx/conf.d/active-upstream.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mlbb_net
    restart: unless-stopped

volumes:
  mlbb_postgres_data:
  mlbb_redis_data:

networks:
  mlbb_net:
    name: mlbb_net
    driver: bridge
